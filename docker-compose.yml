# ============================================================
# Trello Assistant - Docker Compose
# Usage: docker compose up -d
# ============================================================

services:
  # ── App: Rust Backend + React Frontend ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trello-assistant
    restart: unless-stopped
    ports:
      - "3225:3000"
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trello-net

  # ── Redis: Cache Layer ──
  redis:
    image: redis:7-alpine
    container_name: trello-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-trello_redis_2026}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trello_redis_2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trello-net

volumes:
  redis-data:

networks:
  trello-net:
    driver: bridge
